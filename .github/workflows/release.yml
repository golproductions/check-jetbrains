name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "0,/version = \".*\"/s//version = \"$VERSION\"/" build.gradle.kts
          sed -i "0,/version = \".*\"/!s/version = \".*\"/version = \"$VERSION\"/" build.gradle.kts

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Upload to JetBrains Marketplace
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.JETBRAINS_TOKEN }}" \
            -F "pluginId=32408" \
            -F "file=@build/distributions/check-jetbrains-${VERSION}.zip" \
            https://plugins.jetbrains.com/plugin/uploadPlugin
